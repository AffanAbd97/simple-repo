name: CI - Development

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  test:
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.1
            laravel: 10
            testbench: 8
          - php: 8.2
            laravel: 10
            testbench: 8
          - php: 8.3
            laravel: 10
            testbench: 8
          - php: 8.2
            laravel: 11
            testbench: 9
          - php: 8.3
            laravel: 11
            testbench: 9
          - php: 8.2
            laravel: 12
            testbench: 10
          - php: 8.3
            laravel: 12
            testbench: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/support:^${{ matrix.laravel }}.0" \
            "illuminate/console:^${{ matrix.laravel }}.0" \
            "illuminate/database:^${{ matrix.laravel }}.0" \
            "orchestra/testbench:^${{ matrix.testbench }}.0" \
            --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: ./vendor/bin/phpunit
