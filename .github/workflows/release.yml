name: Release - Production

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  test:
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        include:
          - php: 8.1
            laravel: 10
            testbench: 8
            phpunit: "^10.0"
          - php: 8.2
            laravel: 10
            testbench: 8
            phpunit: "^10.0"
          - php: 8.3
            laravel: 10
            testbench: 8
            phpunit: "^10.0"
          - php: 8.2
            laravel: 11
            testbench: 9
            phpunit: "^11.0"
          - php: 8.3
            laravel: 11
            testbench: 9
            phpunit: "^11.0"
          - php: 8.2
            laravel: 12
            testbench: 10
            phpunit: "^11.0"
          - php: 8.3
            laravel: 12
            testbench: 10
            phpunit: "^11.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/support:^${{ matrix.laravel }}.0" \
            "illuminate/console:^${{ matrix.laravel }}.0" \
            "illuminate/database:^${{ matrix.laravel }}.0" \
            --no-update
          composer require --dev \
            "orchestra/testbench:^${{ matrix.testbench }}.0" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: ./vendor/bin/phpunit

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
