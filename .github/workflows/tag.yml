name: Tag Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.1 or 2.0.0)"
        required: true
      notes:
        description: "Release notes (optional)"
        required: false

jobs:
  tag:
    name: Create Tag v${{ github.event.inputs.version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format. Use semver: X.Y.Z"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ github.event.inputs.version }}" \
            -m "Release v${{ github.event.inputs.version }}${{ github.event.inputs.notes && format('{0}{1}', '\n\n', github.event.inputs.notes) || '' }}"
          git push origin "v${{ github.event.inputs.version }}"
